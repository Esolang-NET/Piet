name: build and test

on:
  push:
  pull_request:
    branches: [ main ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.slnx'
      - '**.props'
      - '**.targets'
      - 'global.json'
      - '.github/workflows/**'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: build-and-test-${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macOS-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Tool E2E (pack/install/run)
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          rm -rf .artifacts/tool-e2e
          mkdir -p .artifacts/tool-e2e

          dotnet pack Interpreter/Esolang.Piet.Interpreter.csproj -r "$rid" -p:ToolPackageRuntimeIdentifiers= -o .artifacts/tool-e2e

          nupkg_path=$(find .artifacts/tool-e2e -maxdepth 1 -type f -name "dotnet-piet.*.nupkg" ! -name "*.snupkg" | head -n 1)
          if [ -z "$nupkg_path" ]; then
            echo "Failed to find dotnet-piet nupkg in .artifacts/tool-e2e"
            exit 1
          fi
          nupkg_name=$(basename "$nupkg_path")
          tool_version=${nupkg_name#dotnet-piet.}
          tool_version=${tool_version%.nupkg}
          echo "Detected tool version: $tool_version"

          dotnet new tool-manifest --force
          dotnet tool install dotnet-piet \
            --add-source .artifacts/tool-e2e \
            --version "$tool_version"

          dotnet tool run dotnet-piet -- --help

          # hello-world.png → "Hello, world!" を検証
          output1=$(dotnet tool run dotnet-piet -- samples/Generator.UseConsole/samples/hello-world.png)
          echo "$output1"
          test "$output1" = "Hello, world!"

          # parse サブコマンドで ascii-piet テキストが出力されることを確認
          output2=$(dotnet tool run dotnet-piet -- parse samples/Generator.UseConsole/samples/hello-world.png)
          echo "$output2"
          [ -n "$output2" ]

          # inline ascii-piet テキストで実行
          output3=$(dotnet tool run dotnet-piet -- --ascii-piet-text "l_ C")
          echo "$output3"

          dotnet tool uninstall dotnet-piet

      - name: Pack
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          dotnet pack Generator/Esolang.Piet.Generator.csproj -o artifacts/
          dotnet pack Parser/Esolang.Piet.Parser.csproj -o artifacts/
          dotnet pack Processor/Esolang.Piet.Processor.csproj -o artifacts/
          dotnet pack Interpreter/Esolang.Piet.Interpreter.csproj -p:ToolPackageRuntimeIdentifiers= -o artifacts/
          dotnet pack Interpreter/Esolang.Piet.Interpreter.csproj -p:PublishAot=false -p:ToolPackageRuntimeIdentifiers="" -o artifacts/

      - uses: actions/upload-artifact@v7
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          name: artifacts
          path: artifacts/
