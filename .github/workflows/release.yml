name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-aot:
    name: build-aot-${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: any

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && matrix.rid != 'any'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Pack
        run: |
          dotnet pack Interpreter/Esolang.Piet.Interpreter.csproj -r ${{ matrix.rid }} -c Release -o artifacts/

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-${{ matrix.rid }}
          path: artifacts/*

  publish:
    name: publish-packages-and-release
    needs: build-aot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download AOT Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/aot
          pattern: 'nupkg-*'
          merge-multiple: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack Libraries
        run: |
          dotnet pack Interpreter/Esolang.Piet.Interpreter.csproj -c Release -o artifacts/aot --no-build -p:ToolPackageRuntimeIdentifiers=""
          dotnet pack Generator/Esolang.Piet.Generator.csproj -c Release -o artifacts/nuget --no-build
          dotnet pack Parser/Esolang.Piet.Parser.csproj -c Release -o artifacts/nuget --no-build
          dotnet pack Processor/Esolang.Piet.Processor.csproj -c Release -o artifacts/nuget --no-build

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY secret is not configured."
            exit 1
          fi
          shopt -s nullglob
          push_nupkg() {
            local pkg="$1"
            dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
          push_snupkg() {
            local pkg="$1"
            local snupkg="${pkg%.nupkg}.snupkg"
            if [ -f "$snupkg" ]; then
              dotnet nuget push "$snupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          }
          # Collect nupkg files in order:
          # 1. RID-specific AOT packages (win-x64, linux-x64, osx-*, etc.)
          # 2. any/portable package
          # 3. no-RID meta package (the main dotnet-piet tool entry point)
          # 4. Library packages (Generator, Parser, Processor)
          ordered_nupkgs=()
          for pkg in artifacts/aot/*.nupkg; do
            [[ "$pkg" =~ \.(win|linux|osx|freebsd|android|ios)- ]] || continue
            ordered_nupkgs+=("$pkg")
          done
          for pkg in artifacts/aot/*.nupkg; do
            [[ "$pkg" == *".any."* ]] || continue
            ordered_nupkgs+=("$pkg")
          done
          for pkg in artifacts/aot/*.nupkg; do
            [[ "$pkg" =~ \.(win|linux|osx|freebsd|android|ios)- ]] && continue
            [[ "$pkg" == *".any."* ]] && continue
            ordered_nupkgs+=("$pkg")
          done
          for pkg in artifacts/nuget/*.nupkg; do
            ordered_nupkgs+=("$pkg")
          done
          # Upload all nupkg files first
          for pkg in "${ordered_nupkgs[@]}"; do
            push_nupkg "$pkg"
          done
          # Then upload all snupkg files
          for pkg in "${ordered_nupkgs[@]}"; do
            push_snupkg "$pkg"
          done

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for pkg in artifacts/aot/*.nupkg artifacts/nuget/*.nupkg; do
            case "$pkg" in
              *.snupkg) continue ;;
            esac
            dotnet nuget push "$pkg" --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
          done

      - name: Create GitHub Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          shopt -s nullglob

          lib_assets=(artifacts/nuget/*.nupkg artifacts/nuget/*.snupkg)

          aot_all=(artifacts/aot/*.nupkg artifacts/aot/*.snupkg)
          aot_others=()
          aot_any=()
          for f in "${aot_all[@]}"; do
            if [[ "$f" == *".any."* ]]; then
              aot_any+=("$f")
            else
              aot_others+=("$f")
            fi
          done

          # Order: native RID packages → library packages → any/portable package
          upload_files=("${aot_others[@]}" "${lib_assets[@]}" "${aot_any[@]}")

          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${upload_files[@]}" --clobber
          else
            gh release create "$tag" \
              "${upload_files[@]}" \
              --title "$tag" \
              --generate-notes \
              $prerelease_flag
          fi